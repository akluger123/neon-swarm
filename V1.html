<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SWARM - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000 0%, #0a0a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #loginScreen.hidden {
            display: none;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00ffcc;
            border-radius: 15px;
            padding: 60px;
            box-shadow: 0 0 50px #00ffcc, inset 0 0 50px rgba(0, 255, 204, 0.1);
            min-width: 400px;
            text-align: center;
            animation: loginPulse 2s ease-in-out infinite;
        }

        @keyframes loginPulse {
            0%, 100% { box-shadow: 0 0 50px #00ffcc, inset 0 0 50px rgba(0, 255, 204, 0.1); }
            50% { box-shadow: 0 0 80px #ff00ff, inset 0 0 50px rgba(255, 0, 255, 0.1); }
        }

        .login-title {
            font-size: 48px;
            color: #ff00ff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffcc;
            letter-spacing: 3px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #00ffcc;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #00ffcc;
            letter-spacing: 2px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
        }

        .form-input {
            padding: 15px;
            background: rgba(0, 255, 204, 0.05);
            border: 2px solid #00ffcc;
            border-radius: 5px;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-shadow: 0 0 10px #00ffcc;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 20px #00ffcc, inset 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .form-input::placeholder {
            color: rgba(0, 255, 204, 0.5);
        }

        .login-btn {
            padding: 15px;
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            border-radius: 5px;
            color: #ff00ff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff00ff;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 30px #ff00ff;
            transform: scale(1.05);
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        .login-error {
            color: #ff0055;
            font-size: 14px;
            text-shadow: 0 0 10px #ff0055;
            display: none;
            margin-top: 10px;
        }

        .login-error.show {
            display: block;
        }

        /* ===== GAME SCREEN ===== */
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
        }

        #gameContainer.active {
            display: block;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            font-size: 16px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }

        .header-left {
            display: flex;
            gap: 30px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .admin-badge {
            padding: 5px 15px;
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid #ff00ff;
            border-radius: 5px;
            color: #ff00ff;
            font-size: 12px;
            text-shadow: 0 0 10px #ff00ff;
        }

        #xpBar {
            position: absolute;
            top: 100px;
            left: 20px;
            width: 200px;
            height: 8px;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.2);
        }

        #xpFill {
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #ff00ff);
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: 0 0 10px #00ffcc;
        }

        #comboCounter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }

        #upgradePanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ffcc;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 0 30px #00ffcc, inset 0 0 30px rgba(0, 255, 204, 0.1);
            display: none;
            z-index: 200;
            min-width: 400px;
        }

        #upgradePanel.show {
            display: block;
            animation: panelPulse 0.5s ease;
        }

        @keyframes panelPulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .upgrade-title {
            text-align: center;
            font-size: 24px;
            color: #ff00ff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff00ff;
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .upgrade-btn {
            padding: 20px;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
        }

        .upgrade-btn:hover {
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 20px #00ffcc, inset 0 0 10px rgba(0, 255, 204, 0.2);
            transform: scale(1.05);
        }

        .upgrade-btn:active {
            transform: scale(0.95);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            backdrop-filter: blur(5px);
        }

        #gameOverScreen.show {
            display: flex;
        }

        .gameOverContent {
            text-align: center;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
        }

        .gameOverTitle {
            font-size: 48px;
            margin-bottom: 20px;
            animation: glitch 0.5s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 20px #ff00ff; }
            50% { text-shadow: 0 0 40px #ff00ff, 0 0 60px #00ffcc; }
        }

        .gameOverStats {
            font-size: 20px;
            margin: 20px 0;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }

        .gameOverStats div {
            margin: 10px 0;
        }

        .restartBtn {
            margin-top: 30px;
            padding: 15px 40px;
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            color: #ff00ff;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
            text-shadow: 0 0 10px #ff00ff;
            font-weight: bold;
        }

        .restartBtn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 20px #ff00ff;
            transform: scale(1.05);
        }

        .logoutBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 0, 102, 0.1);
            border: 1px solid #ff0066;
            color: #ff0066;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
            text-shadow: 0 0 10px #ff0066;
            z-index: 150;
            pointer-events: auto;
        }

        .logoutBtn:hover {
            background: rgba(255, 0, 102, 0.2);
            box-shadow: 0 0 15px #ff0066;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-title">⚡ NEON SWARM ⚡</div>
            <div class="login-subtitle">ADMIN PORTAL</div>
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter password">
                </div>
                <button type="submit" class="login-btn">ACCESS SYSTEM</button>
                <div class="login-error" id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="header">
                <div class="header-left">
                    <div class="stat">
                        <div class="stat-label">Level</div>
                        <div class="stat-value" id="levelDisplay">1</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Score</div>
                        <div class="stat-value" id="scoreDisplay">0</div>
                    </div>
                </div>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="stat">
                        <div class="stat-label">High Score</div>
                        <div class="stat-value" id="highScoreDisplay">0</div>
                    </div>
                    <div class="admin-badge" id="adminBadge"></div>
                </div>
            </div>
            <div id="xpBar">
                <div id="xpFill"></div>
            </div>
            <div id="comboCounter">COMBO x1</div>
        </div>

        <div id="upgradePanel">
            <div class="upgrade-title">⚡ LEVEL UP! ⚡</div>
            <div class="upgrades-grid" id="upgradesGrid"></div>
        </div>

        <div id="gameOverScreen">
            <div class="gameOverContent">
                <div class="gameOverTitle">SYSTEM FAILURE</div>
                <div class="gameOverStats">
                    <div>FINAL LEVEL: <span id="finalLevel">0</span></div>
                    <div>TOTAL SCORE: <span id="finalScore">0</span></div>
                    <div>ENEMIES DESTROYED: <span id="finalEnemies">0</span></div>
                </div>
                <button class="restartBtn" onclick="game.restart()">RESTART PROTOCOL</button>
            </div>
        </div>

        <button class="logoutBtn" onclick="handleLogout()">LOGOUT</button>
    </div>

    <script>
        // ===== AUTHENTICATION =====
        let currentUser = null;

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            // Admin credentials
            if (username === 'admin' && password === 'admin') {
                currentUser = { username: 'admin', role: 'administrator' };
                errorEl.classList.remove('show');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('gameContainer').classList.add('active');
                document.getElementById('adminBadge').textContent = '👤 ADMIN';
                initGame();
                return;
            }

            // Invalid credentials
            errorEl.textContent = '❌ INVALID CREDENTIALS';
            errorEl.classList.add('show');
            document.getElementById('password').value = '';
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('loginForm').reset();
            document.getElementById('loginError').classList.remove('show');
            if (game) game.gameOver = true;
        }

        // ===== PARTICLE SYSTEM =====
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.life -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        class ParticleSystem {
            constructor() {
                this.particles = [];
            }

            burst(x, y, color, count = 15) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const speed = Math.random() * 4 + 2;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    this.particles.push(new Particle(x, y, vx, vy, color));
                }
            }

            update() {
                this.particles = this.particles.filter(p => p.life > 0);
                this.particles.forEach(p => p.update());
            }

            draw(ctx) {
                this.particles.forEach(p => p.draw(ctx));
            }
        }

        // ===== ENTITY CLASS =====
        class Entity {
            constructor(x, y, radius, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.vx = 0;
                this.vy = 0;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }

            distanceTo(other) {
                const dx = other.x - this.x;
                const dy = other.y - this.y;
                return Math.sqrt(dx * dx + dy * dy);
            }
        }

        // ===== PROJECTILE CLASS =====
        class Projectile extends Entity {
            constructor(x, y, targetX, targetY) {
                super(x, y, 4, '#00ffcc');
                const dx = targetX - x;
                const dy = targetY - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const speed = 6;
                this.vx = (dx / dist) * speed;
                this.vy = (dy / dist) * speed;
                this.lifetime = 300;
            }

            update() {
                super.update();
                this.lifetime--;
            }
        }

        // ===== ENEMY CLASS =====
        class Enemy extends Entity {
            constructor(x, y) {
                super(x, y, 8, '#ff0055');
                this.speed = Math.random() * 1 + 1;
                this.targetX = Math.random() * window.innerWidth;
                this.targetY = Math.random() * window.innerHeight;
            }

            update(player) {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 10) {
                    this.targetX = Math.random() * window.innerWidth;
                    this.targetY = Math.random() * window.innerHeight;
                }

                this.vx = (dx / dist) * this.speed;
                this.vy = (dy / dist) * this.speed;

                super.update();

                if (this.x < -20) this.x = window.innerWidth + 20;
                if (this.x > window.innerWidth + 20) this.x = -20;
                if (this.y < -20) this.y = window.innerHeight + 20;
                if (this.y > window.innerHeight + 20) this.y = -20;
            }
        }

        // ===== GEM CLASS =====
        class Gem extends Entity {
            constructor(x, y) {
                super(x, y, 5, '#ffff00');
                this.angle = 0;
                this.pulseSize = 0;
            }

            update() {
                this.angle += 0.1;
                this.pulseSize = Math.sin(this.angle) * 2;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = '#ffff00';
                ctx.globalAlpha = 0.8 + Math.sin(this.angle) * 0.2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + this.pulseSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            }
        }

        // ===== POWERUP MANAGER =====
        class PowerUpManager {
            constructor() {
                this.upgrades = [
                    { name: '+1 Projectile', key: 'projectiles', value: 1 },
                    { name: 'Faster Fire Rate', key: 'fireRate', value: -2 },
                    { name: 'Explosive Hits', key: 'explosiveHits', value: 1 },
                    { name: 'Orbiting Shield', key: 'shield', value: 1 },
                    { name: 'Speed Boost', key: 'playerSpeed', value: 0.5 },
                    { name: 'Larger Projectiles', key: 'projectileSize', value: 1 },
                    { name: 'Slow Enemies', key: 'enemySlowdown', value: 0.9 },
                    { name: 'Projectile Bounce', key: 'projectileBounce', value: 1 },
                ];
            }

            getRandomUpgrades(count = 3) {
                const shuffled = [...this.upgrades].sort(() => Math.random() - 0.5);
                return shuffled.slice(0, count);
            }
        }

        // ===== MAIN GAME CLASS =====
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                this.player = null;
                this.enemies = [];
                this.projectiles = [];
                this.gems = [];
                this.particles = new ParticleSystem();
                this.powerUpManager = new PowerUpManager();

                this.level = 1;
                this.xp = 0;
                this.xpToLevel = 100;
                this.score = 0;
                this.highScore = this.loadHighScore();
                this.combo = 1;
                this.comboTimeout = 0;
                this.totalEnemiesKilled = 0;

                this.stats = {
                    projectiles: 1,
                    fireRate: 10,
                    explosiveHits: 0,
                    shield: 0,
                    playerSpeed: 2,
                    projectileSize: 1,
                    enemySlowdown: 1,
                    projectileBounce: 0,
                };

                this.fireCounter = 0;
                this.gameOver = false;

                this.cameraShake = 0;
                this.shakeIntensity = 0;

                this.init();
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            init() {
                this.player = new Entity(window.innerWidth / 2, window.innerHeight / 2, 10, '#00ffcc');
                this.spawnEnemies(3);
                this.gameLoop();
            }

            spawnEnemies(count) {
                for (let i = 0; i < count; i++) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    this.enemies.push(new Enemy(x, y));
                }
            }

            update() {
                if (this.gameOver) return;

                const rect = this.canvas.getBoundingClientRect();
                const mouseX = (window.mouseX || 0) - rect.left;
                const mouseY = (window.mouseY || 0) - rect.top;

                const dx = mouseX - this.player.x;
                const dy = mouseY - this.player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 5) {
                    this.player.vx = (dx / dist) * this.stats.playerSpeed;
                    this.player.vy = (dy / dist) * this.stats.playerSpeed;
                } else {
                    this.player.vx *= 0.9;
                    this.player.vy *= 0.9;
                }

                this.player.update();

                this.player.x = Math.max(this.player.radius, Math.min(window.innerWidth - this.player.radius, this.player.x));
                this.player.y = Math.max(this.player.radius, Math.min(window.innerHeight - this.player.radius, this.player.y));

                this.enemies.forEach(enemy => {
                    enemy.speed = 1 * this.stats.enemySlowdown;
                    enemy.update(this.player);
                });

                this.fireCounter++;
                if (this.fireCounter >= this.stats.fireRate && this.enemies.length > 0) {
                    this.fireCounter = 0;
                    const nearest = this.findNearestEnemy();
                    if (nearest) {
                        for (let i = 0; i < this.stats.projectiles; i++) {
                            const angle = (Math.PI * 2 * i) / this.stats.projectiles;
                            const targetX = nearest.x + Math.cos(angle) * 50;
                            const targetY = nearest.y + Math.sin(angle) * 50;
                            this.projectiles.push(new Projectile(this.player.x, this.player.y, targetX, targetY));
                        }
                    }
                }

                this.projectiles = this.projectiles.filter(p => p.lifetime > 0);
                this.projectiles.forEach(p => p.update());

                this.gems.forEach(g => g.update());

                this.projectiles.forEach((proj, projIdx) => {
                    this.enemies.forEach((enemy, enemyIdx) => {
                        if (proj.distanceTo(enemy) < proj.radius + enemy.radius) {
                            this.particles.burst(enemy.x, enemy.y, '#ff00ff', 15);
                            this.gems.push(new Gem(enemy.x, enemy.y));
                            this.enemies.splice(enemyIdx, 1);
                            this.projectiles.splice(projIdx, 1);
                            this.score += 10;
                            this.combo++;
                            this.comboTimeout = 60;
                            this.totalEnemiesKilled++;
                            this.shake(2, 0.5);

                            if (this.enemies.length === 0) {
                                this.spawnEnemies(Math.min(3 + this.level, 10));
                            }
                        }
                    });
                });

                this.gems = this.gems.filter(gem => {
                    if (this.player.distanceTo(gem) < this.player.radius + gem.radius) {
                        this.xp += 10;
                        this.particles.burst(gem.x, gem.y, '#00ffcc', 10);
                        this.checkLevelUp();
                        return false;
                    }
                    return true;
                });

                this.enemies.forEach(enemy => {
                    if (this.player.distanceTo(enemy) < this.player.radius + enemy.radius) {
                        this.gameOver = true;
                        this.shake(5, 1);
                        this.saveHighScore();
                        this.showGameOverScreen();
                    }
                });

                this.particles.update();

                if (this.comboTimeout > 0) {
                    this.comboTimeout--;
                } else {
                    this.combo = 1;
                }
            }

            findNearestEnemy() {
                let nearest = null;
                let minDist = Infinity;
                this.enemies.forEach(enemy => {
                    const dist = this.player.distanceTo(enemy);
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = enemy;
                    }
                });
                return nearest;
            }

            checkLevelUp() {
                if (this.xp >= this.xpToLevel) {
                    this.xp = 0;
                    this.level++;
                    this.xpToLevel = Math.floor(this.xpToLevel * 1.1);
                    this.showUpgradePanel();
                    this.shake(3, 1);
                }
            }

            showUpgradePanel() {
                const upgrades = this.powerUpManager.getRandomUpgrades(3);
                const grid = document.getElementById('upgradesGrid');
                grid.innerHTML = '';

                upgrades.forEach(upgrade => {
                    const btn = document.createElement('button');
                    btn.className = 'upgrade-btn';
                    btn.innerHTML = `<div style="font-size: 16px;">\${upgrade.name}</div>`;
                    btn.onclick = () => this.selectUpgrade(upgrade);
                    grid.appendChild(btn);
                });

                document.getElementById('upgradePanel').classList.add('show');
            }

            selectUpgrade(upgrade) {
                this.stats[upgrade.key] += upgrade.value;
                document.getElementById('upgradePanel').classList.remove('show');
            }

            shake(intensity, duration) {
                this.cameraShake = duration * 60;
                this.shakeIntensity = intensity;
            }

            draw() {
                const shakeX = this.cameraShake > 0 ? (Math.random() - 0.5) * this.shakeIntensity : 0;
                const shakeY = this.cameraShake > 0 ? (Math.random() - 0.5) * this.shakeIntensity : 0;

                this.ctx.save();
                this.ctx.translate(shakeX, shakeY);

                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.ctx.strokeStyle = 'rgba(0, 255, 204, 0.05)';
                this.ctx.lineWidth = 1;
                const gridSize = 50;
                for (let x = 0; x < this.canvas.width; x += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let y = 0; y < this.canvas.height; y += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }

                this.player.draw(this.ctx);
                this.enemies.forEach(e => e.draw(this.ctx));
                this.projectiles.forEach(p => p.draw(this.ctx));
                this.gems.forEach(g => g.draw(this.ctx));

                this.particles.draw(this.ctx);

                this.ctx.restore();

                this.updateUI();

                if (this.cameraShake > 0) {
                    this.cameraShake--;
                }
            }

            updateUI() {
                document.getElementById('levelDisplay').textContent = this.level;
                document.getElementById('scoreDisplay').textContent = this.score;
                document.getElementById('highScoreDisplay').textContent = this.highScore;

                const xpPercent = (this.xp / this.xpToLevel) * 100;
                document.getElementById('xpFill').style.width = xpPercent + '%';

                const comboEl = document.getElementById('comboCounter');
                if (this.combo > 1) {
                    comboEl.textContent = `COMBO x\${this.combo}`;
                    comboEl.style.opacity = 1;
                } else {
                    comboEl.style.opacity = 0;
                }
            }

            showGameOverScreen() {
                document.getElementById('finalLevel').textContent = this.level;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalEnemies').textContent = this.totalEnemiesKilled;
                document.getElementById('gameOverScreen').classList.add('show');
            }

            restart() {
                location.reload();
            }

            saveHighScore() {
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('neonSwarmHighScore', this.highScore);
                }
            }

            loadHighScore() {
                return parseInt(localStorage.getItem('neonSwarmHighScore') || '0');
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // ===== INITIALIZATION =====
        let game = null;

        function initGame() {
            game = new Game();
        }

        window.addEventListener('mousemove', (e) => {
            window.mouseX = e.clientX;
            window.mouseY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            window.mouseX = touch.clientX;
            window.mouseY = touch.clientY;
        });

        // Focus username input on load
        window.addEventListener('load', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
