<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SWARM 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            overflow: hidden;
        }

        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000 0%, #0a0a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #loginScreen.hidden {
            display: none;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00ffcc;
            border-radius: 15px;
            padding: 60px;
            box-shadow: 0 0 50px #00ffcc, inset 0 0 50px rgba(0, 255, 204, 0.1);
            min-width: 400px;
            text-align: center;
            animation: loginPulse 2s ease-in-out infinite;
        }

        @keyframes loginPulse {
            0%, 100% { box-shadow: 0 0 50px #00ffcc, inset 0 0 50px rgba(0, 255, 204, 0.1); }
            50% { box-shadow: 0 0 80px #ff00ff, inset 0 0 50px rgba(255, 0, 255, 0.1); }
        }

        .login-title {
            font-size: 48px;
            color: #ff00ff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffcc;
            letter-spacing: 3px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #00ffcc;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #00ffcc;
            letter-spacing: 2px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
        }

        .form-input {
            padding: 15px;
            background: rgba(0, 255, 204, 0.05);
            border: 2px solid #00ffcc;
            border-radius: 5px;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-shadow: 0 0 10px #00ffcc;
        }

        .form-input:focus {
            outline: none;
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 20px #00ffcc, inset 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .form-input::placeholder {
            color: rgba(0, 255, 204, 0.5);
        }

        .login-btn {
            padding: 15px;
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            border-radius: 5px;
            color: #ff00ff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff00ff;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 30px #ff00ff;
            transform: scale(1.05);
        }

        .login-error {
            color: #ff0055;
            font-size: 14px;
            text-shadow: 0 0 10px #ff0055;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .demo-text {
            margin-top: 20px;
            color: #00ffcc;
            font-size: 12px;
            opacity: 0.7;
        }

        #gameContainer {
            display: none;
            width: 100%;
            height: 100%;
        }

        #gameContainer.active {
            display: block;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 40px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            font-size: 16px;
            z-index: 10;
        }

        .hud-stat {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hud-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .hud-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            z-index: 10;
        }

        .admin-badge {
            padding: 8px 16px;
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid #ff00ff;
            border-radius: 5px;
            color: #ff00ff;
            font-size: 12px;
            text-shadow: 0 0 10px #ff00ff;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 2px solid #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ffcc;
            pointer-events: none;
            z-index: 5;
        }

        .crosshair::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 15px;
            background: #00ffcc;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #00ffcc;
        }

        .crosshair::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 2px;
            background: #00ffcc;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 10px #00ffcc;
        }

        #xpBar {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 300px;
            height: 14px;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            border-radius: 7px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.2);
            z-index: 10;
        }

        #xpFill {
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #ff00ff);
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: 0 0 10px #00ffcc;
        }

        .xp-label {
            position: absolute;
            bottom: 58px;
            left: 30px;
            font-size: 12px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }

        #comboCounter {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        #upgradePanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.97);
            border: 3px solid #00ffcc;
            border-radius: 15px;
            padding: 50px;
            box-shadow: 0 0 50px #00ffcc, inset 0 0 30px rgba(0, 255, 204, 0.1);
            display: none;
            z-index: 200;
            min-width: 600px;
            pointer-events: auto;
        }

        #upgradePanel.show {
            display: block;
            animation: panelPulse 0.5s ease;
        }

        @keyframes panelPulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .upgrade-title {
            text-align: center;
            font-size: 36px;
            color: #ff00ff;
            margin-bottom: 40px;
            text-shadow: 0 0 20px #ff00ff;
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .upgrade-btn {
            padding: 30px 20px;
            background: rgba(0, 255, 204, 0.05);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
            pointer-events: auto;
        }

        .upgrade-btn:hover {
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 30px #00ffcc, inset 0 0 15px rgba(0, 255, 204, 0.3);
            transform: scale(1.08);
        }

        .upgrade-btn:active {
            transform: scale(0.95);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        #gameOverScreen.show {
            display: flex;
        }

        .gameOverContent {
            text-align: center;
            color: #ff00ff;
            text-shadow: 0 0 30px #ff00ff;
        }

        .gameOverTitle {
            font-size: 72px;
            margin-bottom: 30px;
            animation: glitch 0.5s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 30px #ff00ff; }
            50% { text-shadow: 0 0 60px #ff00ff, 0 0 90px #00ffcc; }
        }

        .gameOverStats {
            font-size: 28px;
            margin: 30px 0;
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
        }

        .gameOverStats div {
            margin: 20px 0;
        }

        .restartBtn {
            margin-top: 40px;
            padding: 20px 60px;
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            color: #ff00ff;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-shadow: 0 0 15px #ff00ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: auto;
        }

        .restartBtn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 40px #ff00ff;
            transform: scale(1.05);
        }

        .logoutBtn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            padding: 12px 24px;
            background: rgba(255, 0, 102, 0.1);
            border: 1px solid #ff0066;
            color: #ff0066;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
            text-shadow: 0 0 10px #ff0066;
            z-index: 150;
            pointer-events: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logoutBtn:hover {
            background: rgba(255, 0, 102, 0.2);
            box-shadow: 0 0 15px #ff0066;
        }

        .controls-info {
            position: absolute;
            bottom: 40px;
            left: 30px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-title">⚡ NEON SWARM ⚡</div>
            <div class="login-subtitle">3D ADMIN PORTAL</div>
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter password">
                </div>
                <button type="submit" class="login-btn">ACCESS SYSTEM</button>
                <div class="login-error" id="loginError"></div>
                <div class="demo-text">Demo: admin / admin</div>
            </form>
        </div>
    </div>

    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="hud">
            <div class="hud-header">
                <div class="hud-stat">
                    <div class="hud-label">Level</div>
                    <div class="hud-value" id="levelDisplay">1</div>
                </div>
                <div class="hud-stat">
                    <div class="hud-label">Score</div>
                    <div class="hud-value" id="scoreDisplay">0</div>
                </div>
                <div class="hud-stat">
                    <div class="hud-label">Health</div>
                    <div class="hud-value" id="healthDisplay">100</div>
                </div>
            </div>

            <div class="hud-top-right">
                <div class="hud-stat">
                    <div class="hud-label">High Score</div>
                    <div class="hud-value" id="highScoreDisplay">0</div>
                </div>
                <div class="admin-badge">👤 ADMIN</div>
            </div>

            <div class="crosshair"></div>
            <div id="comboCounter">COMBO x1</div>

            <div class="xp-label">EXPERIENCE</div>
            <div id="xpBar">
                <div id="xpFill"></div>
            </div>

            <div class="controls-info">
                W/A/S/D - Move<br>
                MOUSE - Aim<br>
                SPACE - Jump<br>
                CLICK - Fire
            </div>

            <button class="logoutBtn" onclick="handleLogout()">LOGOUT</button>
        </div>

        <div id="upgradePanel">
            <div class="upgrade-title">⚡ LEVEL UP! ⚡</div>
            <div class="upgrades-grid" id="upgradesGrid"></div>
        </div>

        <div id="gameOverScreen">
            <div class="gameOverContent">
                <div class="gameOverTitle">SYSTEM FAILURE</div>
                <div class="gameOverStats">
                    <div>FINAL LEVEL: <span id="finalLevel">0</span></div>
                    <div>TOTAL SCORE: <span id="finalScore">0</span></div>
                    <div>ENEMIES DESTROYED: <span id="finalEnemies">0</span></div>
                </div>
                <button class="restartBtn" onclick="location.reload()">RESTART PROTOCOL</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            if (username === 'admin' && password === 'admin') {
                currentUser = { username: 'admin', role: 'administrator' };
                errorEl.classList.remove('show');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('gameContainer').classList.add('active');
                setTimeout(() => initGame(), 100);
                return;
            }

            errorEl.textContent = '❌ INVALID CREDENTIALS';
            errorEl.classList.add('show');
            document.getElementById('password').value = '';
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('loginForm').reset();
            document.getElementById('loginError').classList.remove('show');
            if (game) game.gameOver = true;
        }

        let game = null;

        class NeonSwarm3D {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x000000);
                this.scene.fog = new THREE.Fog(0x000000, 200, 500);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 5, 10);

                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFShadowShadowMap;
                this.renderer.setPixelRatio(window.devicePixelRatio);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                this.scene.add(ambientLight);

                const pointLight = new THREE.PointLight(0x00ffcc, 2, 150);
                pointLight.position.set(0, 30, 0);
                pointLight.castShadow = true;
                this.scene.add(pointLight);

                const pointLight2 = new THREE.PointLight(0xff00ff, 1.5, 120);
                pointLight2.position.set(60, 20, 60);
                this.scene.add(pointLight2);

                this.createGround();

                this.player = null;
                this.enemies = [];
                this.projectiles = [];
                this.gems = [];
                this.particles = [];

                this.level = 1;
                this.xp = 0;
                this.xpToLevel = 100;
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('neonSwarmHighScore') || '0');
                this.health = 100;
                this.maxHealth = 100;
                this.combo = 1;
                this.comboTimeout = 0;
                this.totalEnemiesKilled = 0;
                this.gameOver = false;

                this.stats = {
                    projectiles: 1,
                    fireRate: 10,
                    damage: 10,
                    playerSpeed: 15,
                    projectileSpeed: 50,
                };

                this.fireCounter = 0;
                this.shakeIntensity = 0;

                this.keys = {};
                this.mouse = { x: 0, y: 0 };

                window.addEventListener('keydown', (e) => this.keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => this.keys[e.key.toLowerCase()] = false);
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                });
                window.addEventListener('click', () => this.fireProjectile());
                window.addEventListener('resize', () => this.onWindowResize());

                this.createPlayer();
                this.spawnEnemies(3);
                this.animate();
            }

            createGround() {
                const geometry = new THREE.PlaneGeometry(200, 200);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x0a0a0a,
                    metalness: 0.3,
                    roughness: 0.8
                });
                const ground = new THREE.Mesh(geometry, material);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                const gridHelper = new THREE.GridHelper(200, 40, 0x00ffcc, 0x00ffcc);
                gridHelper.material.transparent = true;
                gridHelper.material.opacity = 0.15;
                gridHelper.position.y = 0.01;
                this.scene.add(gridHelper);
            }

            createPlayer() {
                const geometry = new THREE.IcosahedronGeometry(0.8, 4);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x00ffcc,
                    emissive: 0x00ffcc,
                    emissiveIntensity: 0.5,
                    metalness: 0.7,
                    roughness: 0.3
                });
                this.player = new THREE.Mesh(geometry, material);
                this.player.position.set(0, 1, 0);
                this.player.castShadow = true;
                this.player.receiveShadow = true;

                const light = new THREE.PointLight(0x00ffcc, 2, 20);
                light.position.set(0, 0.5, 0);
                this.player.add(light);

                this.player.velocity = new THREE.Vector3();
                this.scene.add(this.player);
            }

            createEnemy() {
                const geometry = new THREE.OctahedronGeometry(0.6, 2);
                const material = new THREE.MeshStandardMaterial({
                    color: 0xff0055,
                    emissive: 0xff0055,
                    emissiveIntensity: 0.3,
                    metalness: 0.6,
                    roughness: 0.4
                });
                const enemy = new THREE.Mesh(geometry, material);
                enemy.position.set(
                    (Math.random() - 0.5) * 150,
                    1,
                    (Math.random() - 0.5) * 150
                );
                enemy.castShadow = true;
                enemy.receiveShadow = true;

                enemy.velocity = new THREE.Vector3();
                enemy.health = 20;
                enemy.speed = Math.random() * 5 + 3;

                const light = new THREE.PointLight(0xff0055, 1, 15);
                light.position.set(0, 0.3, 0);
                enemy.add(light);

                this.scene.add(enemy);
                this.enemies.push(enemy);
            }

            spawnEnemies(count) {
                for (let i = 0; i < count; i++) {
                    this.createEnemy();
                }
            }

            fireProjectile() {
                if (this.gameOver) return;

                let target = new THREE.Vector3();
                if (this.enemies.length > 0) {
                    let nearest = this.enemies[0];
                    let minDist = this.player.position.distanceTo(nearest.position);
                    for (let enemy of this.enemies) {
                        const dist = this.player.position.distanceTo(enemy.position);
                        if (dist < minDist) {
                            minDist = dist;
                            nearest = enemy;
                        }
                    }
                    target = nearest.position.clone();
                } else {
                    target = this.player.position.clone().add(new THREE.Vector3(0, 0, -50));
                }

                const direction = target.clone().sub(this.player.position).normalize();
                this.createProjectile(this.player.position.clone().add(direction.clone().multiplyScalar(1)), direction);
            }

            createProjectile(position, direction) {
                const geometry = new THREE.SphereGeometry(0.2, 8, 8);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x00ffcc,
                    emissive: 0x00ffcc,
                    emissiveIntensity: 1,
                    metalness: 0.8,
                    roughness: 0.2
                });
                const projectile = new THREE.Mesh(geometry, material);
                projectile.position.copy(position);
                projectile.castShadow = true;

                const light = new THREE.PointLight(0x00ffcc, 1.5, 10);
                projectile.add(light);

                projectile.velocity = direction.clone().multiplyScalar(this.stats.projectileSpeed);
                projectile.lifetime = 300;

                this.scene.add(projectile);
                this.projectiles.push(projectile);
            }

            createGem(position) {
                const geometry = new THREE.TetrahedronGeometry(0.4, 2);
                const material = new THREE.MeshStandardMaterial({
                    color: 0xffff00,
                    emissive: 0xffff00,
                    emissiveIntensity: 0.8,
                    metalness: 0.9,
                    roughness: 0.1
                });
                const gem = new THREE.Mesh(geometry, material);
                gem.position.copy(position);
                gem.castShadow = true;

                const light = new THREE.PointLight(0xffff00, 1, 15);
                gem.add(light);

                gem.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 5,
                    Math.random() * 10 + 5,
                    (Math.random() - 0.5) * 5
                );
                gem.lifetime = 300;
                gem.rotation = new THREE.Euler(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                gem.angularVelocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                );

                this.scene.add(gem);
                this.gems.push(gem);
            }

            createParticles(position, color) {
                for (let i = 0; i < 20; i++) {
                    const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                    const material = new THREE.MeshStandardMaterial({
                        color: color,
                        emissive: color,
                        emissiveIntensity: 0.8
                    });
                    const particle = new THREE.Mesh(geometry, material);
                    particle.position.copy(position);

                    const velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 20,
                        Math.random() * 15 + 5,
                        (Math.random() - 0.5) * 20
                    );
                    particle.velocity = velocity;
                    particle.lifetime = 100;

                    this.scene.add(particle);
                    this.particles.push(particle);
                }
            }

            updatePlayer() {
                const moveDirection = new THREE.Vector3();
                const speed = this.stats.playerSpeed;

                if (this.keys['w']) moveDirection.z -= 1;
                if (this.keys['s']) moveDirection.z += 1;
                if (this.keys['a']) moveDirection.x -= 1;
                if (this.keys['d']) moveDirection.x += 1;

                if (moveDirection.length() > 0) {
                    moveDirection.normalize();
                    this.player.velocity.x = moveDirection.x * speed;
                    this.player.velocity.z = moveDirection.z * speed;
                } else {
                    this.player.velocity.x *= 0.9;
                    this.player.velocity.z *= 0.9;
                }

                if (this.keys[' '] && Math.abs(this.player.position.y - 1) < 0.1) {
                    this.player.velocity.y = 15;
                }

                this.player.velocity.y -= 0.3;
                this.player.position.add(this.player.velocity);

                if (this.player.position.y < 1) {
                    this.player.position.y = 1;
                    this.player.velocity.y = 0;
                }

                this.player.position.x = Math.max(-90, Math.min(90, this.player.position.x));
                this.player.position.z = Math.max(-90, Math.min(90, this.player.position.z));

                this.player.rotation.y += (this.mouse.x * 0.3 - this.player.rotation.y) * 0.1;
            }

            updateEnemies() {
                for (let enemy of this.enemies) {
                    const direction = this.player.position.clone().sub(enemy.position).normalize();
                    enemy.velocity.copy(direction.multiplyScalar(enemy.speed));
                    enemy.position.add(enemy.velocity);

                    enemy.lookAt(this.player.position);

                    enemy.position.x = Math.max(-90, Math.min(90, enemy.position.x));
                    enemy.position.z = Math.max(-90, Math.min(90, enemy.position.z));
                }
            }

            updateProjectiles() {
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const proj = this.projectiles[i];
                    proj.position.add(proj.velocity);
                    proj.lifetime--;

                    if (proj.lifetime <= 0 || Math.abs(proj.position.x) > 100 || Math.abs(proj.position.z) > 100) {
                        this.scene.remove(proj);
                        this.projectiles.splice(i, 1);
                    }
                }
            }

            updateGems() {
                for (let i = this.gems.length - 1; i >= 0; i--) {
                    const gem = this.gems[i];
                    gem.position.add(gem.velocity);
                    gem.velocity.y -= 0.2;
                    gem.rotation.x += gem.angularVelocity.x;
                    gem.rotation.y += gem.angularVelocity.y;
                    gem.rotation.z += gem.angularVelocity.z;
                    gem.lifetime--;

                    if (gem.lifetime <= 0 || gem.position.y < -10) {
                        this.scene.remove(gem);
                        this.gems.splice(i, 1);
                    }
                }
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const particle = this.particles[i];
                    particle.position.add(particle.velocity);
                    particle.velocity.y -= 0.3;
                    particle.lifetime--;
                    particle.material.opacity = particle.lifetime / 100;

                    if (particle.lifetime <= 0) {
                        this.scene.remove(particle);
                        this.particles.splice(i, 1);
                    }
                }
            }

            checkCollisions() {
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const proj = this.projectiles[i];
                    for (let j = this.enemies.length - 1; j >= 0; j--) {
                        const enemy = this.enemies[j];
                        if (proj.position.distanceTo(enemy.position) < 1.2) {
                            this.createParticles(enemy.position, 0xff00ff);
                            this.createGem(enemy.position);
                            this.scene.remove(proj);
                            this.projectiles.splice(i, 1);
                            this.scene.remove(enemy);
                            this.enemies.splice(j, 1);

                            this.score += 10;
                            this.combo++;
                            this.comboTimeout = 60;
                            this.totalEnemiesKilled++;
                            this.shakeIntensity = 2;

                            if (this.enemies.length === 0) {
                                this.spawnEnemies(Math.min(3 + this.level, 12));
                            }
                            break;
                        }
                    }
                }

                for (let i = this.gems.length - 1; i >= 0; i--) {
                    const gem = this.gems[i];
                    if (this.player.position.distanceTo(gem.position) < 1.5) {
                        this.xp += 10;
                        this.createParticles(gem.position, 0x00ffcc);
                        this.scene.remove(gem);
                        this.gems.splice(i, 1);
                        this.checkLevelUp();
                    }
                }

                for (let enemy of this.enemies) {
                    if (this.player.position.distanceTo(enemy.position) < 1.5) {
                        this.health -= 10;
                        this.shakeIntensity = 5;
                        if (this.health <= 0) {
                            this.endGame();
                        }
                    }
                }
            }

            checkLevelUp() {
                if (this.xp >= this.xpToLevel) {
                    this.xp = 0;
                    this.level++;
                    this.xpToLevel = Math.floor(this.xpToLevel * 1.1);
                    this.showUpgradePanel();
                    this.shakeIntensity = 3;
                }
            }

            showUpgradePanel() {
                const upgrades = [
                    { name: '+1 Projectile', key: 'projectiles', value: 1 },
                    { name: 'Faster Fire', key: 'fireRate', value: -1 },
                    { name: '+10 Damage', key: 'damage', value: 10 },
                    { name: 'Speed Boost', key: 'playerSpeed', value: 3 },
                    { name: 'Projectile Speed', key: 'projectileSpeed', value: 10 },
                    { name: 'Heal +30 HP', key: 'heal', value: 30 },
                ];

                const selected = [];
                for (let i = 0; i < 3; i++) {
                    selected.push(upgrades[Math.floor(Math.random() * upgrades.length)]);
                }

                const grid = document.getElementById('upgradesGrid');
                grid.innerHTML = '';
                selected.forEach(upgrade => {
                    const btn = document.createElement('button');
                    btn.className = 'upgrade-btn';
                    btn.innerHTML = upgrade.name;
                    btn.onclick = () => this.selectUpgrade(upgrade);
                    grid.appendChild(btn);
                });

                document.getElementById('upgradePanel').classList.add('show');
                this.gameOver = true;
            }

            selectUpgrade(upgrade) {
                if (upgrade.key === 'heal') {
                    this.health = Math.min(this.maxHealth, this.health + upgrade.value);
                } else {
                    this.stats[upgrade.key] = (this.stats[upgrade.key] || 0) + upgrade.value;
                }
                document.getElementById('upgradePanel').classList.remove('show');
                this.gameOver = false;
            }

            endGame() {
                this.gameOver = true;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('neonSwarmHighScore', this.highScore);
                }
                document.getElementById('finalLevel').textContent = this.level;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalEnemies').textContent = this.totalEnemiesKilled;
                document.getElementById('gameOverScreen').classList.add('show');
            }

            updateUI() {
                document.getElementById('levelDisplay').textContent = this.level;
                document.getElementById('scoreDisplay').textContent = this.score;
                document.getElementById('highScoreDisplay').textContent = this.highScore;
                document.getElementById('healthDisplay').textContent = Math.max(0, Math.floor(this.health));

                const xpPercent = (this.xp / this.xpToLevel) * 100;
                document.getElementById('xpFill').style.width = xpPercent + '%';

                const comboEl = document.getElementById('comboCounter');
                if (this.combo > 1) {
                    comboEl.textContent = `COMBO x\${this.combo}`;
                    comboEl.style.opacity = 1;
                } else {
                    comboEl.style.opacity = 0;
                }

                if (this.comboTimeout > 0) {
                    this.comboTimeout--;
                } else {
                    this.combo = 1;
                }
            }

            update() {
                if (this.gameOver) return;

                this.updatePlayer();
                this.updateEnemies();
                this.updateProjectiles();
                this.updateGems();
                this.updateParticles();
                this.checkCollisions();
                this.updateUI();

                const targetCameraPos = this.player.position.clone().add(new THREE.Vector3(0, 5, 10));
                this.camera.position.lerp(targetCameraPos, 0.1);

                if (this.shakeIntensity > 0) {
                    const shake = (Math.random() - 0.5) * this.shakeIntensity;
                    this.camera.position.x += shake;
                    this.camera.position.y += shake;
                    this.shakeIntensity *= 0.95;
                }

                this.camera.lookAt(this.player.position.clone().add(new THREE.Vector3(0, 2, 0)));
            }

            onWindowResize() {
                const width = window.innerWidth;
                const height = window.innerHeight;
                this.camera.aspect = width / height;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(width, height);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        function initGame() {
            game = new NeonSwarm3D();
        }

        document.getElementById('username').focus();
    </script>
</body>
</html>
